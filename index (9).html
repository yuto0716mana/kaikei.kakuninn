<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会計 暗記シート</title>
<style>
  :root {
    --paper: #fbfaf6;
    --line: #e3ded2;
    --ink: #2b2a26;
    --sub: #8a8577;
    --fusen: #ffe14d;
    --fusen-edge: #f0c92e;
    --fusen-shadow: rgba(120, 90, 0, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    background:
      repeating-linear-gradient(transparent 0px, transparent 35px, rgba(0,0,0,0.025) 35px, rgba(0,0,0,0.025) 36px),
      var(--paper);
    color: var(--ink);
    line-height: 1.65;
    padding-bottom: 80px;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(251,250,246,0.94);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; flex: 1; }
  header h1 span { color: var(--sub); font-size: 11px; font-weight: 500; margin-left: 6px; }
  .btn {
    font-size: 12px; font-weight: 600;
    border: 1px solid var(--line); border-radius: 6px;
    background: #fff; color: var(--ink);
    padding: 6px 10px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: #f1efe8; }
  .count { font-size: 11px; color: var(--sub); white-space: nowrap; }

  main { max-width: 720px; margin: 0 auto; padding: 8px 12px; }
  .row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 2px;
    border-bottom: 1px dashed var(--line);
  }
  .num { font-size: 10px; color: var(--sub); min-width: 26px; padding-top: 4px; font-variant-numeric: tabular-nums; }
  .q { flex: 1; font-size: 13.5px; }
  .a-wrap { position: relative; flex-shrink: 0; max-width: 46%; }
  .a {
    font-size: 13.5px; font-weight: 700;
    color: #b3261e;
    padding: 4px 8px;
    word-break: break-all;
  }
  /* 付箋 */
  .fusen {
    position: absolute; inset: -2px -4px;
    background: linear-gradient(180deg, var(--fusen) 0%, var(--fusen) 82%, var(--fusen-edge) 100%);
    border-radius: 2px;
    box-shadow: 1px 3px 5px var(--fusen-shadow);
    transform: rotate(-1.2deg);
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .fusen::after {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0; width: 14px;
    background: rgba(255,255,255,0.35);
  }
  .row:nth-child(even) .fusen { transform: rotate(1deg); }
  .a-wrap.open .fusen { opacity: 0; pointer-events: none; transform: rotate(-4deg) translateY(-6px); }
  .a-wrap:not(.open) .a { user-select: none; -webkit-user-select: none; }
  .a-wrap.open { cursor: pointer; }

  footer { text-align: center; font-size: 11px; color: var(--sub); margin-top: 30px; }
</style>
</head>
<body>
<header>
  <h1>会計 暗記シート<span id="total"></span></h1>
  <span class="count" id="counter"></span>
  <button class="btn" id="hideAll">全部隠す</button>
  <button class="btn" id="showAll">全部見る</button>
</header>
<main id="list"></main>
<footer>付箋をタップで答え表示 / もう一度タップで隠す</footer>

const list = document.getElementById('list');
const counter = document.getElementById('counter');
document.getElementById('total').textContent = `全${DATA.length}問`;

DATA.forEach(([q, a], i) => {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <span class="num">${i + 1}</span>
    <div class="q"></div>
    <div class="a-wrap">
      <div class="a"></div>
      <div class="fusen" role="button" aria-label="答えを表示"></div>
    </div>`;
  row.querySelector('.q').textContent = q;
  row.querySelector('.a').textContent = a;
  const wrap = row.querySelector('.a-wrap');
  wrap.addEventListener('click', () => {
    wrap.classList.toggle('open');
    updateCounter();
  });
  list.appendChild(row);
});

function updateCounter() {
  const open = document.querySelectorAll('.a-wrap.open').length;
  counter.textContent = `${open}/${DATA.length} 開封`;
}

document.getElementById('hideAll').addEventListener('click', () => {
  document.querySelectorAll('.a-wrap.open').forEach(w => w.classList.remove('open'));
  updateCounter();
});
document.getElementById('showAll').addEventListener('click', () => {
  document.querySelectorAll('.a-wrap').forEach(w => w.classList.add('open'));
  updateCounter();
});
updateCounter();
